<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />

<script src="https://live.zwidgets.com/js-sdk/1.0/ZohoEmbededAppSDK.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Inter, Arial, sans-serif;
  color: #1f2937;
}

.container {
  display: flex;
  height: 100vh;
  background: #fff;
}

.sidebar {
  width: 430px;
  background: #fff;
  border-right: 1px solid #e5e7eb;
  overflow-y: auto;
}

.sidebarTop {
  padding: 18px 16px 12px;
}

.searchRow {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.searchBox {
  position: relative;
  flex: 1;
}

.searchBox input {
  width: 100%;
  height: 46px;
  box-sizing: border-box;
  border: 1px solid #d8dde6;
  border-radius: 8px;
  padding: 0 44px 0 14px;
  font-size: 15px;
  color: #111827;
  outline: none;
}

.searchBox input::placeholder {
  color: #9ca3af;
}

.searchIcon {
  position: absolute;
  right: 14px;
  top: 10px;
  font-size: 22px;
  color: #4b5563;
}

.filterBtn {
  width: 52px;
  height: 46px;
  border: 1px solid #d8dde6;
  border-radius: 8px;
  background: #fff;
  font-size: 21px;
  color: #374151;
  cursor: pointer;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.statCard {
  border: 1px solid #e1e5ec;
  border-radius: 9px;
  padding: 11px 10px;
  min-height: 75px;
  background: #fff;
}

.statCard small {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #374151;
  margin-bottom: 13px;
}

.statCard h2 {
  margin: 0;
  font-size: 28px;
  line-height: 1;
  font-weight: 700;
}

.red { color: #dc2626; }
.blue { color: #2563eb; }
.green { color: #16a34a; }

.lastUpdated {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  font-size: 13px;
  color: #6b7280;
  border-bottom: 1px solid #e5e7eb;
}

.refreshIcon {
  font-size: 18px;
  cursor: pointer;
}

.techCard {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  border-bottom: 1px solid #edf0f4;
  cursor: pointer;
  background: #fff;
}

.techCard:hover,
.techCard.active {
  background: #eef4ff;
}

.avatar {
  width: 52px;
  height: 52px;
  min-width: 52px;
  border-radius: 50%;
  background: #f3f4f6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
}

.techInfo {
  flex: 1;
  min-width: 0;
}

.techNameLink {
  font-size: 17px;
  font-weight: 700;
  color: #111827;
  margin-bottom: 6px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
}

.techNameLink:hover {
  color: #2563eb;
  text-decoration: underline;
}

.statusLine {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
}

.workOrder {
  font-size: 14px;
  color: #6b7280;
  line-height: 1.35;
}

.cardRight {
  font-size: 13px;
  color: #6b7280;
}

.arrow {
  font-size: 28px;
  color: #9ca3af;
  margin-left: 6px;
  cursor: pointer;
  padding: 5px;
}

#map {
  flex: 1;
}

.customMarker {
  background: transparent;
  border: none;
}

.markerWrap {
  display: flex;
  align-items: center;
  gap: 6px;
}

.markerPin {
  width: 42px;
  height: 42px;
  border: 4px solid;
  background: #fff;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  font-size: 20px;
}

.markerPinInner {
  transform: rotate(45deg);
}

.markerLabel {
  background: #fff;
  padding: 8px 10px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  font-size: 13px;
  line-height: 1.3;
  white-space: nowrap;
}

.markerLabel b {
  display: block;
  color: #111827;
}

.markerLabel span {
  font-weight: 700;
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar">

    <div class="sidebarTop">

      <div class="searchRow">
        <div class="searchBox">
          <input id="search" placeholder="Search technician..." />
          <span class="searchIcon">⌕</span>
        </div>

        <button class="filterBtn">▽</button>
      </div>

      <div class="stats">
        <div class="statCard">
          <small>Total Technicians</small>
          <h2 id="total">0</h2>
        </div>

        <div class="statCard">
          <small>Working</small>
          <h2 id="working" class="red">0</h2>
        </div>

        <div class="statCard">
          <small>Travelling</small>
          <h2 id="travelling" class="blue">0</h2>
        </div>

        <div class="statCard">
          <small>Available</small>
          <h2 id="available" class="green">0</h2>
        </div>
      </div>

    </div>

    <div class="lastUpdated">
      <span>Last updated: <span id="lastUpdatedTime">--:--</span></span>
      <span class="refreshIcon" onclick="location.reload()">↻</span>
    </div>

    <div id="propertyList">Loading...</div>

  </div>

  <div id="map"></div>

</div>

<script>
let map;

function openTechnicianRecord(technicianId) {
  if (!technicianId) {
    return;
  }

  ZOHO.CRM.UI.Record.open({
    Entity: "Technicians",
    RecordID: technicianId
  });
}

ZOHO.embeddedApp.on("PageLoad", function () {

  map = L.map("map").setView([40.7128, -74.0060], 8);

  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);

  let now = new Date();
  document.getElementById("lastUpdatedTime").innerText =
    now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

  ZOHO.CRM.API.getAllRecords({
    Entity: "Technician_WO",
    per_page: 200
  }).then(function (res) {

    let records = res.data || [];
    let list = document.getElementById("propertyList");
    list.innerHTML = "";

    document.getElementById("total").innerText = records.length;

    document.getElementById("working").innerText =
      records.filter(r => r.Status == "Work Started").length;

    document.getElementById("travelling").innerText =
      records.filter(r => r.Status == "Trip Started").length;

    document.getElementById("available").innerText =
      records.filter(r => r.Status == "Completed").length;

    records.forEach(function (r) {

      let tech =
        r.Technician_assigned?.name ||
        "No Technician";

      let technicianId =
        r.Technician_assigned?.id ||
        "";

      let workOrder =
        r.Work_Order_Name?.name ||
        r.Work_Order_Name ||
        "No Work Order";

      let rawStatus = r.Status || "";

       /* Hide completed jobs */
    if(rawStatus === "Completed"){
        return;
    }


      let status = "No Status";
      let statusColor = "black";
      let statusIcon = "●";

      if (rawStatus == "Trip Started") {
        status = "Travelling";
        statusColor = "#2563eb";
        statusIcon = "▣";
      }
      else if (rawStatus == "Work Started") {
        status = "Working";
        statusColor = "#dc2626";
        statusIcon = "🔧";
      }
      else if (rawStatus == "Completed") {
        status = "Available";
        statusColor = "#16a34a";
        statusIcon = "●";
      }
      else if (rawStatus == "Arrived") {
        status = "Arrived";
        statusColor = "#ea580c";
        statusIcon = "●";
      }
      else if (rawStatus == "Paused") {
        status = "Paused";
        statusColor = "#6b7280";
        statusIcon = "●";
      }

      let lat = Number(r.Map_Coordinates_Latitude);
      let lng = Number(r.Map_Coordinates_Longitude);

      let div = document.createElement("div");
      div.className = "techCard";

      div.innerHTML = `
        <div class="avatar">👷</div>

        <div class="techInfo">
          <div class="techNameLink" data-technician-id="${technicianId}">
            ${tech}
          </div>

          <div class="statusLine" style="color:${statusColor}">
            ${statusIcon} ${status}
          </div>

          <div class="workOrder">
            WO: ${workOrder}
          </div>
        </div>

        <div class="cardRight">
          <span class="arrow">›</span>
        </div>
      `;

      list.appendChild(div);

      let marker = null;

      if (lat && lng) {
        let customIcon = L.divIcon({
          className: "customMarker",
          html: `
            <div class="markerWrap">
              <div class="markerPin" style="border-color:${statusColor};">
                <div class="markerPinInner">👷</div>
              </div>

              <div class="markerLabel">
                <b>${tech}</b>
                <span style="color:${statusColor};">${status}</span>
              </div>
            </div>
          `,
          iconSize: [180, 70],
          iconAnchor: [25, 55]
        });

        marker = L.marker([lat, lng], {
          icon: customIcon
        })
        .addTo(map)
        .bindPopup(`
          <b>${tech}</b><br>
          <span style="color:${statusColor}; font-weight:bold;">
            ${statusIcon} ${status}
          </span><br>
          WO: ${workOrder}
        `);
      }

      function focusOnMap() {
        document
          .querySelectorAll(".techCard")
          .forEach(c => c.classList.remove("active"));

        div.classList.add("active");

        if (marker && lat && lng) {
          map.setView([lat, lng], 15);
          marker.openPopup();
        }
      }

      div.onclick = focusOnMap;

      div.querySelector(".arrow").onclick = function (e) {
        e.stopPropagation();
        focusOnMap();
      };

      div.querySelector(".techNameLink").onclick = function (e) {
        e.stopPropagation();
        openTechnicianRecord(technicianId);
      };

    });

    document.getElementById("search").addEventListener("input", function () {
      let keyword = this.value.toLowerCase();
      let cards = document.querySelectorAll(".techCard");

      cards.forEach(function (card) {
        let text = card.innerText.toLowerCase();

        if (text.includes(keyword)) {
          card.style.display = "flex";
        } else {
          card.style.display = "none";
        }
      });
    });

  });

});

ZOHO.embeddedApp.init();
</script>

</body>
</html>
